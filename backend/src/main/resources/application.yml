spring:
  application:
    name: smart-campus-backend

  datasource:
    url: jdbc:h2:mem:smartcampusdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.security: INFO
